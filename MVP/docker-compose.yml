services:

  # =========================================================================
  # BACKEND SERVICE: The Flask/Python Application
  # =========================================================================
  backend:
    build:
      context: ./backend

    container_name: loven-backend

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - db

    restart: always

    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FIREBASE_CREDENTIALS_PATH=/app/firebaseKey.json

    volumes:
      - ./backend/firebaseKey.json:/app/firebaseKey.json:ro

  # =========================================================================
  # DATABASE SERVICE: PostgreSQL 15 (Alpine)
  # =========================================================================
  db:
    image: postgres:15-alpine
    container_name: loven-db

    restart: always

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - loven_db_data:/var/lib/postgresql/data


# ===========================================================================
# VOLUMES: Persistent Storage Declarations
# ===========================================================================
volumes:
  loven_db_data: