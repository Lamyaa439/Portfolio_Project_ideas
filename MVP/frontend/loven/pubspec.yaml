name: loven
description: "A full-stack art marketplace app."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- State Mangement ---
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # -- Networking & Backend connection ---
  http: ^1.2.0

# --- Localization & Bilingual support ---
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # --- UI & Styling ---
  flutter_svg: ^2.0.10+1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Flutter Specific Configuration ---
  # --- It must be at the very edge ---
flutter:
  uses-material-design: true

  assets:
    - assets/images/ #For art pieces and backgrounds
    - assets/icons/ # For LOVEN branding
    - assets/fonts/ # For custom SVGs (such as cart, heart, etc.)